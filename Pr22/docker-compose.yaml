version: "3.8"

services:
  backend1:
    build: ./backend
    container_name: backend1
    environment:
      - PORT=3000
      - SERVER_NAME=backend1
    ports:
      - "3000:3000"

  backend2:
    build: ./backend
    container_name: backend2
    environment:
      - PORT=3001
      - SERVER_NAME=backend2
    ports:
      - "3001:3001"

  backend3:
    build: ./backend
    container_name: backend3
    environment:
      - PORT=3002
      - SERVER_NAME=backend3
    ports:
      - "3002:3002"

  nginx:
    image: nginx:latest
    container_name: nginx-balancer
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend1
      - backend2
      - backend3

  haproxy:
    image: haproxy:latest
    container_name: haproxy-balancer
    ports:
      - "8081:80"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - backend1
      - backend2
      - backend3