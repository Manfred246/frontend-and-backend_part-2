<div class="home-content">
  <h2>Добавить заметку</h2>

  <form id="note-form" class="row">
    <input type="text" id="note-input" placeholder="Введите текст заметки" required>
    <button class="button" type="submit">Добавить</button>
  </form>

  <form id="reminder-form" class="row" style="margin-top: 12px;">
    <input type="text" id="reminder-text" placeholder="Текст напоминания" required>
    <input type="datetime-local" id="reminder-time" required>
    <button class="button success" type="submit">Добавить с напоминанием</button>
  </form>

  <h2 style="margin-top: 28px;">Список заметок</h2>
  <ul id="notes-list" style="list-style: none; padding-left: 0; margin: 0;"></ul>
</div>
